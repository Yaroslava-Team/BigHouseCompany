<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Конструктор дома</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/constructor.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<section class="constructor">
  <div class="container">
    <!-- Возврад на главную  -->
    <div class="back-wrapper">
      <a href="index.html" class="back-btn">← Назад</a>
    </div>

    <h1>Конструктор дома</h1>
    <p class="constructor-subtitle">
      Настройте параметры будущего дома и получите примерную стоимость проекта.
    </p>

    <div class="constructor-grid">
      <!-- Левая колонка -->
      <div class="left-col">
        <!-- Площадь дома -->
        <div class="control">
          <label>Площадь дома <span class="value-hint" id="areaValue">120</span> м²</label>
          <input type="range" min="80" max="400" value="120" id="areaSlider">
        </div>

        <!-- Этажность  -->
        <div class="control">
          <label>Количество этажей</label>
          <div class="options" id="floorsOptions">
            <button class="option active" data-floor="1">1</button>
            <button class="option" data-floor="2">2</button>
            <button class="option" data-floor="3">3</button>
          </div>
        </div>

        <!-- Материал дома -->
        <div class="control">
          <label>Материал дома</label>
          <div class="options" id="materialOptions">
            <button class="option active" data-material="frame">Каркасный</button>
            <button class="option" data-material="block">Газобетон</button>
            <button class="option" data-material="brick">Кирпич</button>
          </div>
        </div>

        <!-- Тип крыши  -->
        <div class="control">
          <label>Тип крыши</label>
          <div class="options" id="roofOptions">
            <button class="option active" data-roof="flat">Плоская</button>
            <button class="option" data-roof="pitched">Скатная</button>
            <button class="option" data-roof="combined">Комбинированная</button>
          </div>
        </div>

        <!-- Количество спален -->
        <div class="control">
          <label>Спальни <span class="value-hint" id="bedroomValue">3</span></label>
          <input type="range" min="1" max="6" value="3" id="bedroomSlider">
        </div>

        <!-- Количество санузлов -->
        <div class="control">
          <label>Санузлы <span class="value-hint" id="bathroomValue">2</span></label>
          <input type="range" min="1" max="4" value="2" id="bathroomSlider">
        </div>
      </div>

      <!-- Правая колонка: дополнительные параметры -->
      <div class="right-col">
        <!-- Высота потолков -->
        <div class="control">
          <label>Высота потолков <span class="value-hint" id="ceilingValue">3.0</span> м</label>
          <input type="range" min="2.5" max="4.5" value="3.0" step="0.1" id="ceilingSlider">
        </div>

        <!-- Терраса -->
        <div class="control">
          <label>Площадь террасы <span class="value-hint" id="terraceValue">0</span> м²</label>
          <input type="range" min="0" max="60" value="0" id="terraceSlider">
        </div>

        <!-- Гараж (только слайдер) -->
        <div class="control">
          <label>Площадь гаража <span class="value-hint" id="garageValue">0</span> м²</label>
          <input type="range" min="0" max="80" value="0" id="garageSlider">
        </div>

        <!-- Блок стоимости -->
        <div class="price-block">
          <div class="price-label">Примерная стоимость</div>
          <div class="price" id="totalPrice">8 400 000 ₽</div>
        </div>

        <button class="submit-btn">Получить расчёт →</button>
      </div>
    </div> 
  </div> 
</section>

<script src="js/constructor.js"></script>
</body>
</html>
